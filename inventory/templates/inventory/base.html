<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Inventario{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --dark: #1F2937;
            --light: #F3F4F6;
            --white: #FFFFFF;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-800: #1F2937;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 10;
        }

        .brand {
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .nav-items {
            padding: 1.5rem 1rem;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--gray-800);
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--primary);
            color: var(--white);
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .alert-success { background-color: #D1FAE5; color: #065F46; border: 1px solid #34D399; }
        .alert-error { background-color: #FEE2E2; color: #991B1B; border: 1px solid #F87171; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-boxes-stacked"></i>
            InvSystem
        </div>
        <div class="nav-items">
            <a href="{% url 'inventory:dashboard' %}" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i>
                Dashboard
            </a>
            <a href="{% url 'inventory:product_list' %}" class="nav-item">
                <i class="fa-solid fa-box"></i>
                Productos
            </a>
            <a href="{% url 'inventory:add_category' %}" class="nav-item">
                <i class="fa-solid fa-plus-circle"></i>
                Nueva Categoría
            </a>
            <a href="{% url 'inventory:add_product' %}" class="nav-item">
                <i class="fa-solid fa-cart-plus"></i>
                Nuevo Producto
            </a>
            <a href="{% url 'inventory:upload_inventory' %}" class="nav-item">
                <i class="fa-solid fa-upload"></i>
                Subir Inventario
            </a>
        </div>
    </aside>

    <main class="main-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</div>

<script>
    // Highlight active nav item
    document.addEventListener("DOMContentLoaded", function() {
        let currentPath = window.location.pathname;
        let navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            if (item.getAttribute('href') === currentPath) {
                item.classList.add('active');
            }
        });
    });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
