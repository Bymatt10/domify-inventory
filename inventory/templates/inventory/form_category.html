{% extends 'inventory/base.html' %}

{% block title %}{{ title }} | InvSystem{% endblock %}

{% block extra_css %}
<style>
    .glass-form-container {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border-radius: 1rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid rgba(255,255,255,0.6);
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem;
    }
    .form-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--gray-200);
        padding-bottom: 0.75rem;
    }
    .form-group {
        margin-bottom: 1.25rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--gray-800);
        font-size: 0.875rem;
    }
    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--gray-300);
        border-radius: 0.5rem;
        outline: none;
        font-size: 0.875rem;
        transition: border-color 0.3s ease;
        background-color: var(--white);
    }
    .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .btn-primary {
        width: 100%;
        padding: 0.75rem 1rem;
        background-color: var(--primary);
        color: var(--white);
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        font-weight: 600;
        transition: background-color 0.3s;
        margin-top: 1rem;
    }
    .btn-primary:hover {
        background-color: var(--primary-hover);
    }
    .help-text {
        font-size: 0.75rem;
        color: var(--gray-500);
        margin-top: 0.25rem;
        display: block;
    }
    .error-msg {
        color: var(--danger);
        font-size: 0.75rem;
        margin-top: 0.25rem;
        display: block;
    }
    .form-row {
        display: flex;
        gap: 1rem;
    }
    .form-col {
        flex: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="glass-form-container">
    <h2 class="form-title">{{ title }}</h2>
    <form method="POST" novalidate>
        {% csrf_token %}
        
        <div class="form-group">
            <label for="{{ form.nombre.id_for_label }}">Nombre de Categoría</label>
            {{ form.nombre }}
            {% if form.nombre.errors %}
                <span class="error-msg">{{ form.nombre.errors|join:", " }}</span>
            {% endif %}
        </div>
        
        <button type="submit" class="btn-primary">
            <i class="fa-solid fa-save"></i> Guardar Categoría
        </button>
    </form>
</div>
{% endblock %}
